openapi: 3.0.3
info:
  title: Lob Accounts API
  version: 1.20.2
  description: "Experience direct mail like never before, with unmatched personalization and scalability \x14 all in one intuitive platform."
  license:
    name: MIT
    url: https://mit-license.org/
  contact:
    name: Lob Developer Experience
    url: https://support.lob.com/
    email: lob-openapi@lob.com
  termsOfService: https://www.lob.com/legal
servers:
- url: https://api.lob.com/v1
  description: production
security:
- basicAuth: []
tags:
- name: Accounts
paths:
  /accounts:
    get:
      operationId: get_lob_credits_balance
      summary: Get Lob Credits Balance
      description: Returns the account's current balance of Lob Credits.
      tags:
      - Accounts
      responses:
        '200':
          description: Returns a lob_credits_balance object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/lob_credits_balance'
              examples:
                empty:
                  value:
                    balance: 0
                negative:
                  value:
                    balance: -1234.56
                positive:
                  value:
                    balance: 1000
      x-codeSamples:
      - lang: Shell
        source: "curl https://api.lob.com/v1/accounts/credits_balance \\\n  -u <YOUR API KEY>:\n"
        label: CURL
components:
  schemas:
    lob_credits_balance:
      type: object
      required:
      - balance
      properties:
        balance:
          type: number
          description: Account's current balance of Lob Credits. Can be positive, negative, or zero.
          example: 1000
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
x-webhooks:
  events:
    post:
      summary: Events
      description: Information about an event
      operationId: event
      tags:
      - Events
      responses:
        '200':
          $ref: '#/components/responses/events'
  tracking_events:
    post:
      summary: Tracking Events
      description: Information about tracking events
      operationId: tracking_event
      tags:
      - Tracking Events
      responses:
        '200':
          $ref: '#/components/responses/tracking_events'
