aid: lob
name: Lob
description: >-
  Lob is a software platform that automates the process of sending direct mail, allowing
  businesses to create, personalize, and track physical mail pieces at scale through
  a digital interface, essentially bringing the convenience of email marketing to
  traditional mail by integrating with existing CRM systems and automating printing,
  addressing, and postage processes.
